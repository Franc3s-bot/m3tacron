services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        - INSTALL_PLAYWRIGHT_BROWSER=false
    ports:
      - "8888:8888"
    volumes:
      - ./backend:/app/backend
      - ./test.db:/app/test.db
      - ${SSH_AUTH_SOCK:-/dev/null}:/ssh-agent
    environment:
      - DATABASE_URL=sqlite:///test.db
      - SSH_AUTH_SOCK=/ssh-agent
    command: uvicorn backend.main:app --reload --reload-dir backend --host 0.0.0.0 --port 8888
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
      args:
        - VITE_API_BASE=http://localhost:8888/api
    ports:
      - "3333:3333"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/static:/app/static
      - ./frontend/package.json:/app/package.json
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/svelte.config.js:/app/svelte.config.js
      - ./frontend/tsconfig.json:/app/tsconfig.json
    environment:
      - ORIGIN=http://localhost:3333
      - VITE_API_BASE=http://localhost:8888/api
      - VITE_PROXY_TARGET=http://backend:8888
      - VITE_ALLOWED_HOSTS=localhost
    depends_on:
      - backend
    restart: unless-stopped
